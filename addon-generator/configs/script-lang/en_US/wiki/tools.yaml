# English Wiki Descriptions - Tools
# Format: item_id: "description"

# Vanilla Overrides
wooden_pickaxe: "Wooden Pickaxe. Extremely fragile; shatters instantly when hitting stone or ore."
wooden_axe: "Wooden Axe. Breaks immediately upon contact with stone or ore."
wooden_shovel: "Wooden Shovel. Shatters on impact with hard blocks like stone or ore."
wooden_hoe: "Wooden Hoe. Fragile tool that breaks when used on stone or ore."
wooden_sword: "Wooden Sword. Barely deals any damage (0.5); breaks when hitting stone or ore."
wooden_spear: "Wooden Spear. Extended reach but weak (0.5 damage); breaks when hitting stone or ore."

stone_pickaxe: "Stone Pickaxe. More durable than wood (8 uses), only mines copper and coal ore. Other ores will break the tool. Deals 1 damage."
stone_axe: "Stone Axe. More durable than wood (8 uses), breaks on stone or ore. Deals 1 damage."
stone_shovel: "Stone Shovel. More durable than wood (8 uses), breaks when mining ore. Deals 1 damage."
stone_hoe: "Stone Hoe. More durable than wood (8 uses), breaks on ore. Deals 1 damage."
stone_sword: "Stone Sword. More durable than wood (8 uses), deals 2 damage. Breaks when mining ore."

# Pickaxes
bronze_pickaxe: "Bronze pickaxe used for mining stone and ores. Equivalent to iron pickaxe."

# Flint Tools
flint_knife: "Flint Knife. The first primitive tool, deals 2 damage. Durability: 12 uses."
flint_pickaxe: "Flint Pickaxe. Only mines coal and stone; other ores will break the tool. Durability: 12 uses."
flint_axe: "Flint Axe. Chops wood effectively, breaks on stone or ore. Durability: 12 uses."
flint_shovel: "Flint Shovel. Digs dirt, sand, gravel. Breaks on stone or ore. Durability: 12 uses."
flint_hoe: "Flint Hoe. Tills farmland, breaks on stone or ore. Durability: 12 uses."
