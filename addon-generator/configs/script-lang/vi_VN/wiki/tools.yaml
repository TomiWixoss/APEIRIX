# Vietnamese Wiki Descriptions - Tools
# Format: item_id: "description"

# Vanilla Overrides
wooden_pickaxe: "Cuốc Gỗ. Cực kỳ mỏng manh; vỡ ngay lập tức khi đập vào đá hoặc quặng."
wooden_axe: "Rìu Gỗ. Vỡ ngay khi chạm vào đá hoặc quặng."
wooden_shovel: "Xẻng Gỗ. Vỡ tan khi va chạm với khối cứng như đá hoặc quặng."
wooden_hoe: "Cuốc Gỗ. Công cụ mỏng manh, vỡ khi dùng trên đá hoặc quặng."
wooden_sword: "Kiếm Gỗ. Hầu như không gây sát thương (0.5); vỡ khi đập vào đá hoặc quặng."
wooden_spear: "Giáo Gỗ. Tầm đánh xa nhưng yếu ớt (0.5 damage); vỡ khi đập vào đá hoặc quặng."

# Pickaxes
bronze_pickaxe: "Cuốc đồng thanh dùng để khai thác đá và quặng. Tương đương với cuốc sắt."

# Flint Tools
flint_knife: "Dao Đá Lửa. Công cụ thô sơ đầu tiên, gây 2 sát thương. Độ bền 12 lần dùng."
flint_pickaxe: "Cúp Đá Lửa. Chỉ đào được than và đá, các quặng khác sẽ làm vỡ công cụ. Độ bền 12 lần dùng."
flint_axe: "Rìu Đá Lửa. Chặt gỗ hiệu quả, vỡ khi đập vào đá hoặc quặng. Độ bền 12 lần dùng."
flint_shovel: "Xẻng Đá Lửa. Đào đất, cát, sỏi. Vỡ khi đập vào đá hoặc quặng. Độ bền 12 lần dùng."
flint_hoe: "Cuốc Đá Lửa. Cày đất trồng trọt, vỡ khi đập vào đá hoặc quặng. Độ bền 12 lần dùng."
